<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title - recommendation style -->
  <text x="400" y="50" text-anchor="middle" font-size="26" font-weight="bold" fill="#fff">听我的，用它！真的香！</text>

  <!-- Before/After comparison -->
  <g transform="translate(50, 90)">
    <!-- Before -->
    <rect x="0" y="0" width="330" height="160" fill="#16213e" stroke="#e74c3c" stroke-width="2" rx="12"/>
    <text x="165" y="30" text-anchor="middle" font-size="14" fill="#e74c3c" font-weight="bold">❌ 以前写文档</text>

    <g transform="translate(30, 55)">
      <text x="0" y="0" font-size="14" fill="#fff">😫 对着空白文档发呆</text>
    </g>
    <g transform="translate(30, 80)">
      <text x="0" y="0" font-size="14" fill="#fff">😰 不知道标准是啥</text>
    </g>
    <g transform="translate(30, 105)">
      <text x="0" y="0" font-size="14" fill="#fff">😓 改了800遍还是不满意</text>
    </g>
    <g transform="translate(30, 130)">
      <text x="0" y="0" font-size="14" fill="#fff">😟 例子总是编造</text>
    </g>

    <!-- Arrow in middle -->
    <text x="360" y="85" font-size="32" fill="#4a9eda">➜</text>

    <!-- After -->
    <rect x="400" y="0" width="330" height="160" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>
    <text x="565" y="30" text-anchor="middle" font-size="14" fill="#4a9eda" font-weight="bold">✅ 现在用 Writing-CC</text>

    <g transform="translate(430, 55)">
      <text x="0" y="0" font-size="14" fill="#fff">😊 说出需求就自动写</text>
    </g>
    <g transform="translate(430, 80)">
      <text x="0" y="0" font-size="14" fill="#fff">🎯 GPT-5.4 评分校验</text>
    </g>
    <g transform="translate(430, 105)">
      <text x="0" y="0" font-size="14" fill="#fff">✨ 分数 ≥8.5 才算完</text>
    </g>
    <g transform="translate(430, 130)">
      <text x="0" y="0" font-size="14" fill="#fff">📚 例子都有真实来源</text>
    </g>
  </g>

  <!-- Key selling points -->
  <g transform="translate(50, 280)">
    <text x="350" y="0" text-anchor="middle" font-size="18" fill="#fff" font-weight="bold">🏆 强烈推荐的理由</text>

    <rect x="0" y="20" width="700" height="140" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>

    <!-- Point 1 -->
    <g transform="translate(30, 50)">
      <circle cx="10" cy="0" r="8" fill="#e74c3c"/>
      <text x="30" y="5" font-size="14" fill="#fff" font-weight="bold">任何文档都能写</text>
      <text x="30" y="25" font-size="12" fill="#888">论文综述、技术文档、学习总结...</text>
    </g>

    <!-- Point 2 -->
    <g transform="translate(360, 50)">
      <circle cx="10" cy="0" r="8" fill="#e74c3c"/>
      <text x="30" y="5" font-size="14" fill="#fff" font-weight="bold">GPT-5.4 深度校验</text>
      <text x="30" y="25" font-size="12" fill="#888">最先进模型帮你把关质量</text>
    </g>

    <!-- Point 3 -->
    <g transform="translate(30, 100)">
      <circle cx="10" cy="0" r="8" fill="#e74c3c"/>
      <text x="30" y="5" font-size="14" fill="#fff" font-weight="bold">5轮迭代优化</text>
      <text x="30" y="25" font-size="12" fill="#888">不停改改改，直到你满意</text>
    </g>

    <!-- Point 4 -->
    <g transform="translate(360, 100)">
      <circle cx="10" cy="0" r="8" fill="#e74c3c"/>
      <text x="30" y="5" font-size="14" fill="#fff" font-weight="bold">免费！开源！</text>
      <text x="30" y="25" font-size="12" fill="#888">Claude Code 技能，直接用</text>
    </g>
  </g>

  <!-- CTA with GitHub -->
  <g transform="translate(100, 460)">
    <rect x="0" y="0" width="600" height="90" fill="#16213e" stroke="#e74c3c" stroke-width="2" rx="12"/>
    <text x="300" y="30" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">真的！快去试试！</text>
    <text x="300" y="55" text-anchor="middle" font-size="14" fill="#4a9eda">/writing-cc "你的文档需求"</text>
    <text x="300" y="80" text-anchor="middle" font-size="11" fill="#888">github.com/zjYao36/markdown-claude-code</text>
  </g>
</svg>