<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="400" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-size="22" font-weight="bold" fill="#fff">工作流</text>

  <!-- Pipeline steps -->
  <g transform="translate(40, 100)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="100" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="8"/>
    <text x="50" y="30" text-anchor="middle" font-size="13" fill="#fff">输入需求</text>

    <text x="120" y="35" font-size="18" fill="#4a9eda">→</text>

    <!-- Step 2 -->
    <rect x="140" y="0" width="100" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="8"/>
    <text x="190" y="30" text-anchor="middle" font-size="13" fill="#fff">AI 写作</text>

    <text x="260" y="35" font-size="18" fill="#4a9eda">→</text>

    <!-- Step 3: Validation -->
    <rect x="280" y="0" width="120" height="60" fill="#16213e" stroke="#e74c3c" stroke-width="2" rx="8"/>
    <text x="340" y="30" text-anchor="middle" font-size="13" fill="#e74c3c" font-weight="bold">GPT-5.4 校验</text>

    <text x="420" y="35" font-size="18" fill="#4a9eda">→</text>

    <!-- Step 4 -->
    <rect x="440" y="0" width="100" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="8"/>
    <text x="490" y="30" text-anchor="middle" font-size="13" fill="#fff">迭代优化</text>

    <text x="560" y="35" font-size="18" fill="#4a9eda">→</text>

    <!-- Step 5 -->
    <rect x="580" y="0" width="80" height="60" fill="#4a9eda" rx="8"/>
    <text x="620" y="30" text-anchor="middle" font-size="13" fill="#fff">完成</text>
  </g>

  <!-- Loop indicator -->
  <g transform="translate(500, 90)">
    <path d="M 0 0 Q 20 -20 40 0" fill="none" stroke="#4a9eda" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="20" y="-10" text-anchor="middle" font-size="9" fill="#888">最多5轮</text>
  </g>

  <!-- Bottom info -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="600" height="120" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>

    <g transform="translate(30, 30)">
      <text x="0" y="0" font-size="14" fill="#fff" font-weight="bold">适用于：</text>
      <text x="80" y="0" font-size="14" fill="#888">论文综述、技术文档、学习总结等任何文档类型</text>
    </g>

    <g transform="translate(30, 60)">
      <text x="0" y="0" font-size="14" fill="#fff" font-weight="bold">校验标准：</text>
      <text x="80" y="0" font-size="14" fill="#888">5-7个评估维度，分数量化质量，分数 ≥8.5 达标</text>
    </g>

    <g transform="translate(30, 90)">
      <text x="0" y="0" font-size="14" fill="#fff" font-weight="bold">来源保障：</text>
      <text x="80" y="0" font-size="14" fill="#888">所有例子必须有真实来源，可追溯</text>
    </g>
  </g>

  <!-- CTA -->
  <text x="400" y="370" text-anchor="middle" font-size="14" fill="#888">/writing-cc "你的文档需求"</text>
</svg>