<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="600" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" font-size="32" font-weight="bold" fill="#fff">Writing-CC 解决了什么？</text>

  <!-- Problem vs Solution -->
  <!-- Left: Pain points -->
  <g transform="translate(60, 140)">
    <text x="170" y="0" text-anchor="middle" font-size="18" fill="#e74c3c">❌ 写作痛点</text>
    <rect x="0" y="20" width="340" height="180" fill="#16213e" stroke="#e74c3c" stroke-width="2" rx="12"/>

    <g transform="translate(30, 50)">
      <text x="0" y="0" font-size="20" fill="#e74c3c">✖</text>
      <text x="30" y="5" font-size="14" fill="#fff">写文档无从下手</text>
    </g>
    <g transform="translate(30, 85)">
      <text x="0" y="0" font-size="20" fill="#e74c3c">✖</text>
      <text x="30" y="5" font-size="14" fill="#fff">不知道标准是什么</text>
    </g>
    <g transform="translate(30, 120)">
      <text x="0" y="0" font-size="20" fill="#e74c3c">✖</text>
      <text x="30" y="5" font-size="14" fill="#fff">例子总是编造</text>
    </g>
    <g transform="translate(30, 155)">
      <text x="0" y="0" font-size="20" fill="#e74c3c">✖</text>
      <text x="30" y="5" font-size="14" fill="#fff">不知道改到啥程度</text>
    </g>
  </g>

  <!-- Arrow in middle -->
  <g transform="translate(400, 230)">
    <text x="0" y="0" font-size="40" fill="#4a9eda">→</text>
  </g>

  <!-- Right: Solutions -->
  <g transform="translate(460, 140)">
    <text x="170" y="0" text-anchor="middle" font-size="18" fill="#4a9eda">✅ Writing-CC</text>
    <rect x="0" y="20" width="340" height="180" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>

    <g transform="translate(30, 50)">
      <text x="0" y="0" font-size="20" fill="#4a9eda">✓</text>
      <text x="30" y="5" font-size="14" fill="#fff">需求分析 + 提纲</text>
    </g>
    <g transform="translate(30, 85)">
      <text x="0" y="0" font-size="20" fill="#4a9eda">✓</text>
      <text x="30" y="5" font-size="14" fill="#fff">5-7个评估维度</text>
    </g>
    <g transform="translate(30, 120)">
      <text x="0" y="0" font-size="20" fill="#4a9eda">✓</text>
      <text x="30" y="5" font-size="14" fill="#fff">真实来源可查证</text>
    </g>
    <g transform="translate(30, 155)">
      <text x="0" y="0" font-size="20" fill="#4a9eda">✓</text>
      <text x="30" y="5" font-size="14" fill="#fff">分数 ≥8.5 达标</text>
    </g>
  </g>

  <!-- Bottom: Target users -->
  <g transform="translate(100, 380)">
    <text x="300" y="0" text-anchor="middle" font-size="20" fill="#fff">🎯 适合谁？</text>
    <rect x="0" y="20" width="600" height="120" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>

    <g transform="translate(50, 60)">
      <circle cx="15" cy="0" r="8" fill="#4a9eda"/>
      <text x="35" y="5" font-size="16" fill="#fff">研究生 / 博士生</text>
    </g>
    <g transform="translate(230, 60)">
      <circle cx="15" cy="0" r="8" fill="#4a9eda"/>
      <text x="35" y="5" font-size="16" fill="#fff">科研人员</text>
    </g>
    <g transform="translate(410, 60)">
      <circle cx="15" cy="0" r="8" fill="#4a9eda"/>
      <text x="35" y="5" font-size="16" fill="#fff">技术写作者</text>
    </g>

    <g transform="translate(140, 95)">
      <circle cx="15" cy="0" r="8" fill="#4a9eda"/>
      <text x="35" y="5" font-size="16" fill="#fff">写论文综述</text>
    </g>
    <g transform="translate(320, 95)">
      <circle cx="15" cy="0" r="8" fill="#4a9eda"/>
      <text x="35" y="5" font-size="16" fill="#fff">技术文档</text>
    </g>
    <g transform="translate(480, 95)">
      <circle cx="15" cy="0" r="8" fill="#4a9eda"/>
      <text x="35" y="5" font-size="16" fill="#fff">学习总结</text>
    </g>
  </g>

  <!-- Bottom CTA -->
  <text x="400" y="560" text-anchor="middle" font-size="16" fill="#888">#AI 写作 #科研工具 #研究生</text>
</svg>