<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="800" fill="#1a1a2e"/>

  <!-- Main title -->
  <text x="400" y="200" text-anchor="middle" font-size="42" font-weight="bold" fill="#fff">AI 文档写作助手</text>
  <text x="400" y="250" text-anchor="middle" font-size="20" fill="#4a9eda">自动化写作 + GPT-5.4 深度校验</text>

  <!-- Icon -->
  <g transform="translate(325, 320)">
    <rect x="0" y="0" width="150" height="180" fill="#16213e" stroke="#4a9eda" stroke-width="3" rx="12"/>
    <line x1="25" y1="35" x2="125" y2="35" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="60" x2="110" y2="60" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="85" x2="125" y2="85" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="110" x2="90" y2="110" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="135" x2="105" y2="135" stroke="#4a9eda" stroke-width="2"/>
    <!-- Verified badge -->
    <circle cx="130" cy="150" r="25" fill="#4a9eda"/>
    <text x="130" y="157" text-anchor="middle" font-size="18" fill="#fff">✓</text>
  </g>

  <!-- Key features -->
  <g transform="translate(100, 550)">
    <rect x="0" y="0" width="180" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="30"/>
    <text x="90" y="28" text-anchor="middle" font-size="14" fill="#fff">任何文档类型</text>
    <text x="90" y="45" text-anchor="middle" font-size="11" fill="#888">一键自动写作</text>
  </g>

  <g transform="translate(310, 550)">
    <rect x="0" y="0" width="180" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="30"/>
    <text x="90" y="28" text-anchor="middle" font-size="14" fill="#fff">GPT-5.4 校验</text>
    <text x="90" y="45" text-anchor="middle" font-size="11" fill="#888">质量有保障</text>
  </g>

  <g transform="translate(520, 550)">
    <rect x="0" y="0" width="180" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="30"/>
    <text x="90" y="28" text-anchor="middle" font-size="14" fill="#fff">真实来源</text>
    <text x="90" y="45" text-anchor="middle" font-size="11" fill="#888">可追溯</text>
  </g>

  <!-- Install -->
  <text x="400" y="680" text-anchor="middle" font-size="14" fill="#888">安装：cp -r writing-cc ~/.claude/skills/</text>
  <text x="400" y="710" text-anchor="middle" font-size="14" fill="#4a9eda">github.com/zjYao36/markdown-claude-code</text>
</svg>