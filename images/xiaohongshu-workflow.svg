<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="800" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" font-size="36" font-weight="bold" fill="#fff">6步搞定高质量文档</text>

  <!-- Workflow steps -->
  <!-- Step 1 -->
  <g transform="translate(80, 160)">
    <circle cx="30" cy="30" r="25" fill="#4a9eda"/>
    <text x="30" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">1</text>
    <text x="30" y="80" text-anchor="middle" font-size="16" fill="#fff">需求分析</text>
    <text x="30" y="100" text-anchor="middle" font-size="12" fill="#888">明确目标受众</text>
  </g>
  <line x1="130" y1="185" x2="180" y2="185" stroke="#4a9eda" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Step 2 -->
  <g transform="translate(200, 160)">
    <circle cx="30" cy="30" r="25" fill="#4a9eda"/>
    <text x="30" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">2</text>
    <text x="30" y="80" text-anchor="middle" font-size="16" fill="#fff">制定标准</text>
    <text x="30" y="100" text-anchor="middle" font-size="12" fill="#888">5-7个评估维度</text>
  </g>
  <line x1="250" y1="185" x2="300" y2="185" stroke="#4a9eda" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Step 3 -->
  <g transform="translate(320, 160)">
    <circle cx="30" cy="30" r="25" fill="#4a9eda"/>
    <text x="30" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">3</text>
    <text x="30" y="80" text-anchor="middle" font-size="16" fill="#fff">研究撰写</text>
    <text x="30" y="100" text-anchor="middle" font-size="12" fill="#888">真实来源支撑</text>
  </g>
  <line x1="370" y1="185" x2="420" y2="185" stroke="#4a9eda" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Step 4 -->
  <g transform="translate(440, 160)">
    <circle cx="30" cy="30" r="25" fill="#4a9eda"/>
    <text x="30" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">4</text>
    <text x="30" y="80" text-anchor="middle" font-size="16" fill="#fff">GPT 审阅</text>
    <text x="30" y="100" text-anchor="middle" font-size="12" fill="#888">结构化评分</text>
  </g>
  <line x1="490" y1="185" x2="540" y2="185" stroke="#4a9eda" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Step 5 -->
  <g transform="translate(560, 160)">
    <circle cx="30" cy="30" r="25" fill="#4a9eda"/>
    <text x="30" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">5</text>
    <text x="30" y="80" text-anchor="middle" font-size="16" fill="#fff">迭代修订</text>
    <text x="30" y="100" text-anchor="middle" font-size="12" fill="#888">直到分数≥8.5</text>
  </g>
  <line x1="610" y1="185" x2="660" y2="185" stroke="#4a9eda" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- Step 6 -->
  <g transform="translate(680, 160)">
    <circle cx="30" cy="30" r="25" fill="#4a9eda"/>
    <text x="30" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">6</text>
    <text x="30" y="80" text-anchor="middle" font-size="16" fill="#fff">输出文档</text>
    <text x="30" y="100" text-anchor="middle" font-size="12" fill="#888">可直接使用</text>
  </g>

  <!-- Visual: Pipeline diagram -->
  <g transform="translate(150, 320)">
    <rect x="0" y="0" width="500" height="200" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>
    <text x="250" y="40" text-anchor="middle" font-size="18" fill="#4a9eda">Pipeline 示意</text>

    <!-- Arrows and boxes -->
    <rect x="30" y="70" width="80" height="50" fill="#1a1a2e" stroke="#4a9eda" rx="8"/>
    <text x="70" y="100" text-anchor="middle" font-size="12" fill="#fff">分析</text>

    <text x="160" y="100" font-size="16" fill="#4a9eda">→</text>

    <rect x="190" y="70" width="80" height="50" fill="#1a1a2e" stroke="#4a9eda" rx="8"/>
    <text x="230" y="100" text-anchor="middle" font-size="12" fill="#fff">写作</text>

    <text x="290" y="100" font-size="16" fill="#4a9eda">→</text>

    <rect x="320" y="70" width="80" height="50" fill="#1a1a2e" stroke="#4a9eda" rx="8"/>
    <text x="360" y="100" text-anchor="middle" font-size="12" fill="#fff">GPT</text>

    <text x="420" y="100" font-size="16" fill="#4a9eda">↻</text>

    <rect x="30" y="140" width="160" height="40" fill="#16213e" stroke="#888" rx="20"/>
    <text x="110" y="165" text-anchor="middle" font-size="12" fill="#888">最多 5 轮迭代</text>

    <rect x="220" y="140" width="160" height="40" fill="#16213e" stroke="#4a9eda" rx="20"/>
    <text x="300" y="165" text-anchor="middle" font-size="12" fill="#4a9eda">分数 ≥ 8.5 达标</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="600" text-anchor="middle" font-size="16" fill="#fff">每轮修订都有完整记录</text>
  <text x="400" y="630" text-anchor="middle" font-size="14" fill="#888">writing-logs/ 目录可追溯全过程</text>

  <!-- CTA -->
  <rect x="250" y="670" width="300" height="50" fill="#4a9eda" rx="25"/>
  <text x="400" y="700" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">试试看：/writing-cc "你的需求"</text>
</svg>