<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="800" fill="#1a1a2e"/>

  <!-- Decorative grid -->
  <g opacity="0.08" stroke="#4a9eda" stroke-width="1">
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
  </g>

  <!-- Main title -->
  <text x="400" y="180" text-anchor="middle" font-size="44" font-weight="bold" fill="#fff">任何文档都能自动写</text>
  <text x="400" y="230" text-anchor="middle" font-size="24" fill="#4a9eda">GPT-5.4 深度校验，质量有保障</text>

  <!-- Icon: Document + AI brain -->
  <g transform="translate(325, 290)">
    <!-- Document -->
    <rect x="0" y="0" width="150" height="180" fill="#16213e" stroke="#4a9eda" stroke-width="3" rx="12"/>
    <line x1="25" y1="35" x2="125" y2="35" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="60" x2="110" y2="60" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="85" x2="125" y2="85" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="110" x2="90" y2="110" stroke="#4a9eda" stroke-width="2"/>
    <!-- AI brain icon -->
    <circle cx="130" cy="145" r="25" fill="#4a9eda"/>
    <text x="130" y="152" text-anchor="middle" font-size="20" fill="#fff">🧠</text>
  </g>

  <!-- Tagline -->
  <g transform="translate(100, 530)">
    <text x="300" y="0" text-anchor="middle" font-size="20" fill="#fff">"写文档这件事，就该交给 AI"</text>
    <rect x="150" y="15" width="300" height="2" fill="#4a9eda"/>
  </g>

  <!-- Feature cards -->
  <g transform="translate(80, 570)">
    <rect x="0" y="0" width="200" height="70" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>
    <text x="100" y="30" text-anchor="middle" font-size="32" fill="#4a9eda">📝</text>
    <text x="100" y="55" text-anchor="middle" font-size="14" fill="#fff">任何文档类型</text>
  </g>

  <g transform="translate(300, 570)">
    <rect x="0" y="0" width="200" height="70" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>
    <text x="100" y="30" text-anchor="middle" font-size="32" fill="#4a9eda">⚡</text>
    <text x="100" y="55" text-anchor="middle" font-size="14" fill="#fff">一键自动写作</text>
  </g>

  <g transform="translate(520, 570)">
    <rect x="0" y="0" width="200" height="70" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>
    <text x="100" y="30" text-anchor="middle" font-size="32" fill="#4a9eda">✅</text>
    <text x="100" y="55" text-anchor="middle" font-size="14" fill="#fff">GPT-5.4 校验</text>
  </g>

  <!-- GitHub link -->
  <text x="400" y="700" text-anchor="middle" font-size="14" fill="#888">GitHub: github.com/zjYao36/markdown-claude-code</text>

  <!-- Bottom decoration -->
  <rect x="350" y="730" width="100" height="4" fill="#4a9eda" rx="2"/>
</svg>