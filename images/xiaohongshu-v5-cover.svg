<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" font-family="monospace">
  <!-- Dark background -->
  <rect width="800" height="900" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-size="32" font-weight="bold" fill="#fff">打工人自动化生成文档 | 提效工具</text>

  <!-- Icon -->
  <g transform="translate(325, 110)">
    <rect x="0" y="0" width="150" height="180" fill="#16213e" stroke="#4a9eda" stroke-width="3" rx="12"/>
    <line x1="25" y1="35" x2="125" y2="35" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="60" x2="110" y2="60" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="85" x2="125" y2="85" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="110" x2="90" y2="110" stroke="#4a9eda" stroke-width="2"/>
    <line x1="25" y1="135" x2="105" y2="135" stroke="#4a9eda" stroke-width="2"/>
    <!-- Verified badge -->
    <circle cx="130" cy="150" r="25" fill="#4a9eda"/>
    <text x="130" y="157" text-anchor="middle" font-size="18" fill="#fff">✓</text>
  </g>

  <!-- Core description -->
  <g transform="translate(50, 340)">
    <rect x="0" y="0" width="700" height="280" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="12"/>

    <text x="350" y="30" text-anchor="middle" font-size="16" fill="#4a9eda" font-weight="bold">为什么这个工具更好？</text>

    <!-- Point 1 -->
    <g transform="translate(30, 60)">
      <text x="0" y="0" font-size="12" fill="#fff">传统 LLM 通过检索模型中的记忆来进行内容生成；</text>
      <text x="0" y="20" font-size="12" fill="#888">搭配 Agent 方案后，模型具备了检索能力，</text>
      <text x="0" y="40" font-size="12" fill="#888">内容生成质量和实时性均更强。</text>
    </g>

    <!-- Point 2 -->
    <g transform="translate(30, 120)">
      <text x="0" y="0" font-size="12" fill="#fff">Claude Code、OpenClaw 等工具更是允许模型</text>
      <text x="0" y="20" font-size="12" fill="#888">对本地数据进行读写，效率更胜一筹。</text>
    </g>

    <!-- Point 3: Problem -->
    <g transform="translate(30, 160)">
      <text x="0" y="0" font-size="12" fill="#e74c3c">但是，单一模型存在偏好差异，</text>
      <text x="0" y="20" font-size="12" fill="#e74c3c">并且幻觉问题严重导致可用率低。</text>
    </g>

    <!-- Point 4: Solution -->
    <g transform="translate(30, 200)">
      <text x="0" y="0" font-size="12" fill="#4a9eda">该工具引入额外大模型进行交叉评估，</text>
      <text x="0" y="20" font-size="12" fill="#4a9eda">反复迭代修改，不断提高生成文档的质量。</text>
    </g>

    <!-- Point 5: Advantage -->
    <g transform="translate(30, 240)">
      <text x="0" y="0" font-size="14" fill="#fff" font-weight="bold">通用性更强，支持任意类型文档编写，</text>
      <text x="0" y="20" font-size="14" fill="#fff" font-weight="bold">妥妥提效工具，最少人工介入完成工作。</text>
    </g>
  </g>

  <!-- Key features -->
  <g transform="translate(100, 660)">
    <rect x="0" y="0" width="180" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="30"/>
    <text x="90" y="28" text-anchor="middle" font-size="14" fill="#fff">任意文档类型</text>
    <text x="90" y="45" text-anchor="middle" font-size="11" fill="#888">通用性强</text>
  </g>

  <g transform="translate(310, 660)">
    <rect x="0" y="0" width="180" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="30"/>
    <text x="90" y="28" text-anchor="middle" font-size="14" fill="#fff">GPT-5.4 校验</text>
    <text x="90" y="45" text-anchor="middle" font-size="11" fill="#888">质量有保障</text>
  </g>

  <g transform="translate(520, 660)">
    <rect x="0" y="0" width="180" height="60" fill="#16213e" stroke="#4a9eda" stroke-width="2" rx="30"/>
    <text x="90" y="28" text-anchor="middle" font-size="14" fill="#fff">最少人工介入</text>
    <text x="90" y="45" text-anchor="middle" font-size="11" fill="#888">真正提效</text>
  </g>

  <!-- Install -->
  <text x="400" y="790" text-anchor="middle" font-size="14" fill="#888">安装：cp -r writing-cc ~/.claude/skills/</text>
  <text x="400" y="820" text-anchor="middle" font-size="14" fill="#4a9eda">github.com/zjYao36/markdown-claude-code</text>
</svg>